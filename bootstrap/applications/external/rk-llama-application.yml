apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rk-llama
  namespace: argocd
spec:
  destination:
    namespace: rk-llama
    server: https://kubernetes.default.svc
  project: default
  source:
    path: apps/rk-llama
    repoURL: https://github.com/igou-io/igou-kubernetes.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
