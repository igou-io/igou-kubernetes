apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
  - argocd-namespace.yaml
  - igou-kubernetes-repo-secret.yaml
helmCharts:
- name: argo-cd
  includeCRDs: true
  releaseName: argocd
  namespace: argocd
  version: 9.5.21
  repo: https://argoproj.github.io/argo-helm
  valuesInline:
    fullnameOverride: argocd

    configs:
      cm:
        url: https://argocd.apps.igou.systems
        application.resourceTrackingMethod: annotation+label
        statusbadge.enabled: "true"
        # The whole repo renders kustomize + inline helmCharts; ArgoCD's
        # bundled kustomize must run with helm support enabled.
        kustomize.buildOptions: --enable-helm
      params:
        controller.diff.server.side: "true"

    dex:
      enabled: false
