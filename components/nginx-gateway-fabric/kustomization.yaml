apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: nginx-gateway
resources:
  - nginx-gateway-namespace.yaml
  # Gateway API CRDs at the exact version this NGF release is built against
  - https://github.com/nginx/nginx-gateway-fabric/config/crd/gateway-api/standard?ref=v2.6.3
helmCharts:
- name: nginx-gateway-fabric
  includeCRDs: true
  releaseName: nginx-gateway
  namespace: nginx-gateway
  version: 2.6.3
  repo: oci://ghcr.io/nginx/charts
  valuesInline:
    nginxGateway:
      replicas: 1
